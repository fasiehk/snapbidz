<!DOCTYPE html>

<style>
        .glass-surface {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bg-gradient-mesh {
            background-color: #fcf8ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(96, 99, 238, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 222, 163, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-gradient-mesh min-h-screen text-on-background font-body-md selection:bg-primary/20">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full h-16 px-6 flex justify-between items-center bg-white/70 backdrop-blur-[10px] z-50 border-b border-white/30 shadow-[0_4px_30px_rgba(0,0,0,0.05)]">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary active:scale-95 duration-200 transition-transform">close</button>
</div>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-indigo-600">LuxAuction</h1>
<div class="w-10 h-10 rounded-full border border-white/30 overflow-hidden shadow-sm">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A clean, professional headshot of a person for a user profile avatar. The background is a soft, out-of-focus light purple gradient that matches the premium app aesthetic. The lighting is bright and high-key, emphasizing a modern and trustworthy digital persona. The overall image has a polished, high-end gallery feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8UHEWBAkpHbHWLZpcxyBS_Rx9i4envBbtEcWWlEC6VIOh0QV03xRS7HvDOVIYnpvwsmnGUSES0DZOaNoYr_r9ew0aAAYf3j3e3KGX9RLCZmKiTqGAOlg0TmOcNCf9mofFETvGKy2EXFMcNabOb9VpwANyl5JJkUBQlN5ByyvpW8d1J1Ee0gfdeOtyakSCj1Pos7EPCAjcOcC-O28cNhTCKPqusDM-7iUNSGBc-qwwR7nZA4FJyqINzdQ-By5r3GajgpCZqxDsAdNK"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Title Section -->
<div class="mb-xl">
<h2 class="font-h2 text-h2 text-on-surface mb-xs">What are you selling?</h2>
<p class="text-on-surface-variant font-body-md">Step 1: Choose a category for your listing</p>
</div>
<!-- Search Bar -->
<div class="mb-xl relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-14 pl-12 pr-4 bg-white/10 border border-white/30 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md glass-surface" placeholder="Search categories..." type="text"/>
</div>
<!-- Category Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Electronics -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">devices</span>
</div>
<span class="font-h3 text-base text-on-surface">Electronics</span>
</button>
<!-- Vehicles -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">directions_car</span>
</div>
<span class="font-h3 text-base text-on-surface">Vehicles</span>
</button>
<!-- Fashion -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">checkroom</span>
</div>
<span class="font-h3 text-base text-on-surface">Fashion</span>
</button>
<!-- Real Estate -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">apartment</span>
</div>
<span class="font-h3 text-base text-on-surface">Real Estate</span>
</button>
<!-- Art -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">palette</span>
</div>
<span class="font-h3 text-base text-on-surface">Fine Art</span>
</button>
<!-- Watches -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">watch</span>
</div>
<span class="font-h3 text-base text-on-surface">Watches</span>
</button>
<!-- Jewelry -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">diamond</span>
</div>
<span class="font-h3 text-base text-on-surface">Jewelry</span>
</button>
<!-- Other -->
<button class="glass-surface p-lg rounded-xl flex flex-col items-center text-center gap-sm active:scale-95 transition-all shadow-[0_10px_30px_rgba(0,0,0,0.05)] group">
<div class="w-14 h-14 rounded-full bg-indigo-50/50 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-weight="fill">category</span>
</div>
<span class="font-h3 text-base text-on-surface">Other</span>
</button>
</div>
<!-- Featured Section Asymmetric Layout -->
<div class="mt-xl">
<h3 class="font-h3 text-lg mb-md">Trending This Week</h3>
<div class="glass-surface p-md rounded-xl flex items-center gap-md relative overflow-hidden border-indigo-200/50">
<div class="w-24 h-24 rounded-lg overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="A high-end studio product photograph of a luxury minimalist watch with a sapphire crystal face and a brushed titanium band. The lighting is dramatic and sculptural, casting soft shadows against a clean, light-colored background. The aesthetic is sophisticated and premium, aligned with a high-stakes digital auction environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB370mfF63YrGdUjLd3p6Ohe7cWlpCdCqD56RL4nNg3-iOK8_XQEgTYd_40OR_YI40HECBM-3VKskBVNWc1NkYyvYBhya9m8Ldx9QlzZGKB7TWdl7yNYzQCHoKJem4POfeuwPGveyd_b4XT90AuFwEwFY79aSCbMjOo5bUxNEXk4kWx6xYXAlwRLE5CjSAHMGVS8VGsTsNQUEFRcGsfCBGT20aMcQaS9cPYusUpxdZlTGyzZEol8FzFwFW0dT7h2HEpepSq4gjKYkCw"/>
</div>
<div>
<div class="bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider inline-block mb-1">High Demand</div>
<p class="font-h3 text-base">Luxury Timepieces</p>
<p class="text-label-sm text-on-surface-variant">420 listings today</p>
</div>
<span class="material-symbols-outlined absolute right-4 text-primary">chevron_right</span>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed as requested for task focus, but template provided for structure) -->
<!-- Not visible due to Transactional flow nature (listing start) -->
<div class="fixed bottom-0 left-0 w-full p-6 glass-surface border-t border-white/30 z-50">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-bold font-h3 text-base shadow-[0_10px_20px_rgba(70,72,212,0.3)] active:scale-[0.98] transition-all">
            Continue
        </button>
</div>
</body></html>
