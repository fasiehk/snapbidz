name: snapbid
description: "SnapBid - Premium Auction Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Fonts
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.4.1

  # Animations & UI
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0

  # Appwrite Backend
  appwrite: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
